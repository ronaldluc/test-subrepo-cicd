name: ops-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ops: ${{ steps.filter.outputs.ops }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ops:
              - 'ops/**'

  lint:
    needs: changes
    if: needs.changes.outputs.ops == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "ops-ci caught the path filter"

  ops-gate:
    needs: [changes, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "changes.ops=${{ needs.changes.outputs.ops }}"
          echo "lint.result=${{ needs.lint.result }}"
          if [ "${{ needs.lint.result }}" = "success" ] || [ "${{ needs.lint.result }}" = "skipped" ]; then exit 0; fi
          exit 1
