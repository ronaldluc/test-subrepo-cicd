name: ops-ci

on:
  pull_request:
    paths:
      - "ops/**"
  push:
    branches: [main]
    paths:
      - "ops/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "ops-ci caught the path filter"

  ops-gate:
    needs: [lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          if [ "${{ needs.lint.result }}" = "success" ] || [ "${{ needs.lint.result }}" = "skipped" ]; then
            exit 0
          else
            exit 1
          fi
