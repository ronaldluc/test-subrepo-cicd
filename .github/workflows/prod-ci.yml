name: prod-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      prod: ${{ steps.filter.outputs.prod }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            prod:
              - 'prod/**'

  lint:
    needs: changes
    if: needs.changes.outputs.prod == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: List prod paths touched
        run: |
          echo "prod-ci caught the path filter"
          ls -la prod/
      - name: Show clip.mp4 size (LFS smudge check)
        run: |
          if [ -f prod/mock-app/clip.mp4 ]; then
            wc -c prod/mock-app/clip.mp4
            file prod/mock-app/clip.mp4 || true
          else
            echo "no clip.mp4 yet"
          fi

  ci-gate:
    needs: [changes, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate (skipped-as-success)
        run: |
          echo "changes.prod=${{ needs.changes.outputs.prod }}"
          echo "lint.result=${{ needs.lint.result }}"
          if [ "${{ needs.lint.result }}" = "success" ] || [ "${{ needs.lint.result }}" = "skipped" ]; then
            echo "prod-ci gate green"
            exit 0
          fi
          echo "prod-ci gate red"
          exit 1
